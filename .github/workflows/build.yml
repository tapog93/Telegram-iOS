name: Build Swiftgram IPA
on: [workflow_dispatch] # Запуск вручную

jobs:
  build:
    runs-on: macos-14 # Используем сервера с процессором M2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bazel
        run: brew install bazelisk

      - name: Generate Xcode Project
        run: |
          python3 build-system/Make/Make.py \
            --all \
            --bundle_id "com.yourname.swiftgram" \
            --team_id "YOUR_TEAM_ID" \
            --disable-extensions \
            generateXcode

      - name: Build IPA
        run: |
          # Здесь запускается команда сборки через Bazel
          # Для AltStore нам нужен generic build
          bazel build //Telegram:Telegram --config=ios_arm64
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Swiftgram-IPA
          path: bazel-bin/Telegram/Telegram.ipa
