name: Build Swiftgram for AltStore

on:
  workflow_dispatch: # Allows you to click "Run Workflow" manually
  schedule:
    - cron: '0 0 * * 0' # Auto-build every Sunday (refreshes 7-day cert)

jobs:
  build:
    runs-on: macos-14 # Latest macOS runner
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Free Up Disk Space (Critical for Free Tier)
        run: |
          sudo rm -rf /Applications/Xcode_14.3.1.app
          sudo rm -rf /Applications/Xcode_15.0.app
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes
          sudo df -h /

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2' # Use a stable version

      - name: Install Code Signing Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CERTIFICATE_P12 }}
          p12-password: ${{ secrets.CERTIFICATE_PASSWORD }}

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Create API Config (Telegram Keys)
        run: |
          # Swiftgram needs API keys to compile. 
          # Adjust the path below if Swiftgram uses a different config file structure.
          mkdir -p Swiftgram/Config
          cat > Swiftgram/Config/ApiCredentials.swift <<EOF
          struct ApiCredentials {
              static let apiId = "${{ secrets.TG_API_ID }}"
              static let apiHash = "${{ secrets.TG_API_HASH }}"
          }
          EOF

      - name: Build IPA
        run: |
          xcodebuild -workspace Swiftgram.xcworkspace \
            -scheme Swiftgram \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $GITHUB_WORKSPACE/build/Swiftgram.xcarchive \
            clean archive \
            CODE_SIGN_IDENTITY="Apple Development" \
            DEVELOPMENT_TEAM="${{ secrets.TEAM_ID }}" \
            PROVISIONING_PROFILE_SPECIFIER="profile" \
            PRODUCT_BUNDLE_IDENTIFIER="${{ secrets.BUNDLE_ID }}"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $GITHUB_WORKSPACE/build/Swiftgram.xcarchive \
            -exportPath $GITHUB_WORKSPACE/build \
            -exportOptionsPlist exportOptions.plist

      - name: Create Export Options
        run: |
          cat > exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: Swiftgram-Signed
          path: build/Swiftgram.ipa
